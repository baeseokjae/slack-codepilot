services:
  slack-bot:
    build:
      context: .
      target: bot
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - GIT_WORKSPACE_DIR=/tmp/codepilot-workspaces
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "find", "/tmp/worker-health", "-mmin", "-1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    tmpfs:
      - /tmp/codepilot-workspaces:size=512M

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - slack-bot
    restart: unless-stopped

volumes:
  redis-data:
